name: Test PR 2227 - Do the failover immediately if the replica is the best ranked replica

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  test-pr-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout fuzzer repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Build Valkey from PR branch
      run: |
        mkdir -p /tmp/valkey-build
        cd /tmp
        git init valkey-pr
        cd valkey-pr
        git remote add origin https://github.com/valkey-io/valkey.git
        git fetch --depth 1 origin pull/2227/head:pr-2227
        git checkout pr-2227
        make -j$(nproc)
        sudo make install PREFIX=/usr/local
        mv /tmp/valkey-pr /tmp/valkey-build/valkey
    
    - name: Install fuzzer dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .
    
    - name: Run fuzzer with PR branch
      run: |
        echo "========================================"
        echo "Testing PR #2227 Branch"
        echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
        echo "========================================"
        valkey-fuzzer cluster --random --verbose
    
    - name: Print Valkey node logs
      if: always()
      run: |
        echo ""
        echo "========================================"
        echo "Valkey Node Logs (PR Branch)"
        echo "========================================"
        if [ -d "/tmp/valkey-fuzzer/logs" ]; then
          for logfile in /tmp/valkey-fuzzer/logs/*.log; do
            if [ -f "$logfile" ]; then
              echo ""
              echo "--- $(basename $logfile) ---"
              cat "$logfile"
            fi
          done
        else
          echo "No Valkey logs found"
        fi
